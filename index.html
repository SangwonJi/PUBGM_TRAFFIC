<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile Revenue by Country</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            background-color: #f8f8f8;
            color: #333333;
            padding: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1920px;
            margin: 0 auto;
            background: #ffffff;
        }
        
        .header {
            background-color: #dcdcdc;
            border-bottom: 1px solid #cccccc;
            padding: 10px 15px;
        }
        
        .header h1 {
            font-size: 14px;
            font-weight: bold;
            color: #333333;
            margin: 0;
        }
        
        .header p {
            font-size: 11px;
            color: #666666;
            margin-top: 2px;
        }
        
        .toolbar {
            padding: 8px 15px;
            background: #e6e6e6;
            border-bottom: 1px solid #cccccc;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .toolbar input[type="file"] {
            padding: 4px 8px;
            border: 1px solid #cccccc;
            background: #ffffff;
            color: #333333;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        .toolbar button {
            padding: 4px 12px;
            background-color: #4CAF50;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        
        .toolbar button:hover {
            background-color: #45a049;
        }
        
        .status-badge {
            background: #4CAF50;
            color: #ffffff;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
        }
        
        .content {
            padding: 15px;
            background: #f8f8f8;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            background: #ffffff;
        }
        
        .stat-item {
            background: #ffffff;
            padding: 10px 15px;
            border-right: 1px solid #cccccc;
            text-align: left;
        }
        
        .stat-item:last-child {
            border-right: none;
        }
        
        .stat-item:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        .stat-label {
            font-size: 10px;
            color: #666666;
            margin-bottom: 5px;
            font-weight: normal;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            line-height: 1.2;
        }
        
        .stat-value.positive {
            color: #008000;
        }
        
        .stat-value.negative {
            color: #ff0000;
        }
        
        #treemap {
            width: 100%;
            height: 900px;
            background: #ffffff;
            border: 1px solid #cccccc;
        }
        
        .footer {
            padding: 8px 15px;
            border-top: 1px solid #cccccc;
            background: #e6e6e6;
            font-size: 11px;
            color: #666666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PUBG Mobile Revenue by Country</h1>
            <p>Top 15 Countries - 3-Day Revenue Analysis</p>
        </div>
        
        <div class="toolbar">
            <input type="file" id="csvFile" accept=".csv" />
            <button onclick="loadCSV()">Load CSV</button>
            <div class="status-badge" id="status">Sample Data</div>
        </div>
        
        <div class="content">
            <div class="stats-grid" id="stats"></div>
            <div id="treemap"></div>
        </div>
        
        <div class="footer">
            CSV Format: Country,Day1,Day2,Day3 | Hover for details
        </div>
    </div>

    <script>
        const sampleData = {
            Country: ['USA', 'China', 'India', 'Japan', 'Korea', 'Brazil', 'Germany', 'UK', 'France', 'Russia', 'Indonesia', 'Thailand', 'Vietnam', 'Philippines', 'Mexico'],
            Day1: [500000, 400000, 300000, 250000, 200000, 180000, 150000, 140000, 130000, 120000, 110000, 100000, 90000, 85000, 80000],
            Day2: [520000, 410000, 320000, 240000, 210000, 190000, 155000, 145000, 135000, 125000, 115000, 105000, 95000, 90000, 85000],
            Day3: [575000, 434000, 366000, 237500, 206000, 203400, 157500, 147000, 136500, 126000, 116600, 105000, 97200, 91800, 86400]
        };

        let currentData = sampleData;

        function loadCSV() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file.');
                return;
            }
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    const processed = processData(data);
                    if (processed) {
                        currentData = processed;
                        document.getElementById('status').textContent = 'CSV Loaded';
                        createTreemap(currentData);
                    }
                },
                error: function(error) {
                    alert('Error reading CSV: ' + error);
                }
            });
        }

        function processData(data) {
            try {
                const countries = [];
                const day1 = [];
                const day2 = [];
                const day3 = [];
                
                data.forEach(row => {
                    if (row.Country && row.Day1 && row.Day2 && row.Day3) {
                        countries.push(row.Country);
                        day1.push(parseInt(row.Day1));
                        day2.push(parseInt(row.Day2));
                        day3.push(parseInt(row.Day3));
                    }
                });
                
                if (countries.length === 0) {
                    alert('No valid data found. Check CSV format.');
                    return null;
                }
                
                return { Country: countries, Day1: day1, Day2: day2, Day3: day3 };
            } catch (error) {
                alert('Error processing data: ' + error);
                return null;
            }
        }

        function calculateStats(data) {
            const totalRevenue = [];
            const changePercent = [];
            
            for (let i = 0; i < data.Country.length; i++) {
                const total = data.Day1[i] + data.Day2[i] + data.Day3[i];
                totalRevenue.push(total);
                const change = ((data.Day3[i] - data.Day1[i]) / data.Day1[i]) * 100;
                changePercent.push(change);
            }
            
            const indices = Array.from({length: data.Country.length}, (_, i) => i)
                .sort((a, b) => totalRevenue[b] - totalRevenue[a])
                .slice(0, 15);
            
            const topCountries = indices.map(i => data.Country[i]);
            const topRevenue = indices.map(i => totalRevenue[i]);
            const topChange = indices.map(i => changePercent[i]);
            
            const totalSum = topRevenue.reduce((a, b) => a + b, 0);
            const avgChange = topChange.reduce((a, b) => a + b, 0) / topChange.length;
            const maxChange = Math.max(...topChange);
            const minChange = Math.min(...topChange);
            
            return {
                totalSum,
                avgChange,
                maxChange,
                minChange,
                topCountries,
                topRevenue,
                topChange,
                indices
            };
        }

        function createTreemap(data) {
            const stats = calculateStats(data);
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-item">
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-value">$${(stats.totalSum / 1000000).toFixed(2)}M</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Avg Change</div>
                    <div class="stat-value ${stats.avgChange >= 0 ? 'positive' : 'negative'}">${stats.avgChange >= 0 ? '+' : ''}${stats.avgChange.toFixed(2)}%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Max Increase</div>
                    <div class="stat-value positive">+${stats.maxChange.toFixed(2)}%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Max Decrease</div>
                    <div class="stat-value negative">${stats.minChange.toFixed(2)}%</div>
                </div>
            `;
            
            const labels = stats.topCountries.map((country, i) => 
                `<b style="font-size:12px;color:#333333">${country}</b><br><span style="font-size:11px;color:#666666">$${(stats.topRevenue[i] / 1000).toFixed(0)}K</span><br><span style="font-size:11px;color:${stats.topChange[i] >= 0 ? '#008000' : '#ff0000'}">${stats.topChange[i] >= 0 ? '+' : ''}${stats.topChange[i].toFixed(1)}%</span>`
            );
            
            const parents = stats.topCountries.map(() => '');
            
            const absMaxChange = Math.max(Math.abs(stats.maxChange), Math.abs(stats.minChange));
            const colors = stats.topChange.map(change => {
                if (change >= 0) {
                    const intensity = Math.min(change / absMaxChange, 1);
                    const green = Math.round(128 + (127 * intensity));
                    return `rgb(0, ${green}, 0)`;
                } else {
                    const intensity = Math.min(Math.abs(change) / absMaxChange, 1);
                    const red = Math.round(128 + (127 * intensity));
                    return `rgb(${red}, 0, 0)`;
                }
            });
            
            const trace = {
                type: 'treemap',
                labels: labels,
                parents: parents,
                values: stats.topRevenue,
                marker: {
                    colors: colors,
                    line: { width: 1, color: '#cccccc' },
                    pad: { b: 3, l: 3, r: 3, t: 3 }
                },
                textinfo: 'label',
                textfont: { 
                    size: 12, 
                    color: '#333333',
                    family: 'Arial, Helvetica, sans-serif'
                },
                hovertemplate: '<b>%{label}</b><br>Revenue: $%{value:,.0f}<extra></extra>',
                textposition: 'middle center'
            };
            
            const layout = {
                title: { text: '', font: { size: 0 } },
                paper_bgcolor: '#ffffff',
                plot_bgcolor: '#ffffff',
                margin: { l: 0, r: 0, t: 0, b: 0 },
                height: 900,
                font: {
                    family: 'Arial, Helvetica, sans-serif',
                    size: 12,
                    color: '#333333'
                }
            };
            
            Plotly.newPlot('treemap', [trace], layout, {responsive: true});
        }

        window.onload = function() {
            createTreemap(currentData);
        };
    </script>
</body>
</html>
